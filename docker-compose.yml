version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: subscription_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subscriptiondb
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subscription_api
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=subscriptiondb;Username=postgres;Password=postgres
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always